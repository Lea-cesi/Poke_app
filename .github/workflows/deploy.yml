name: Deploy

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          docker pull ghcr.io/lea-cesi/poke_app:latest
          docker stop poke || true
          docker rm poke || true
          docker run -d -p 8080:8080 --name poke ghcr.io/lea-cesi/poke_app:latest
